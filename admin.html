<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#253e5d">
  <title>Admin — Dolci Dri</title>
  <style>
    :root {
      --navy:#253e5d; --navy-d:#162540; --cream:#e6d4bc; --paper:#f5ead8;
      --gold:#e8b35c; --gold-d:#d9a44c; --green:#007047; --green-l:#16a06a;
      --red:#b42a2a; --blue:#1b4f8a; --blue-l:#3b82c4;
      --ink:#162438; --muted:#5e6e82; --line:#e6d4bc;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, "Segoe UI", Arial, Helvetica, sans-serif;
      background:
        radial-gradient(1200px 500px at 50% -200px, #fff6e6 0%, transparent 60%),
        var(--paper);
      color: var(--ink);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    /* ── GATE ── */
    #gate {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 32px 24px;
      gap: 16px;
    }
    #gate .gate-card {
      width: min(360px, 100%);
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 34px 26px 30px;
      box-shadow: 0 18px 50px rgba(22,37,64,.14);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }
    #gate img { width: 130px; }
    #gate h1 { font-size: 1.25rem; color: var(--navy); text-align: center; letter-spacing: -.01em; }
    #gate .sub { font-size: .9rem; color: var(--muted); text-align: center; margin-top: -6px; }
    #gate input {
      width: 100%;
      min-height: 54px;
      padding: 0 20px;
      border: 1.5px solid #dac9b0;
      border-radius: 12px;
      font: inherit;
      font-size: 1.15rem;
      text-align: center;
      letter-spacing: 0.12em;
      background: #fdfbf7;
      color: var(--ink);
    }
    #gate input:focus { outline: 0; border-color: var(--gold); box-shadow: 0 0 0 4px rgba(232,179,92,.28); }
    #gate .btn-entrar {
      width: 100%;
      min-height: 54px;
      background: linear-gradient(180deg, var(--gold), var(--gold-d));
      color: var(--navy-d);
      border: 0;
      border-radius: 12px;
      font: inherit;
      font-size: 1.05rem;
      font-weight: 800;
      cursor: pointer;
      transition: filter 120ms, transform 80ms;
    }
    #gate .btn-entrar:hover { filter: brightness(1.04); }
    #gate .btn-entrar:active { transform: translateY(1px); }
    #gate-erro { color: var(--red); font-size: 0.9rem; min-height: 1.2em; font-weight: 600; }

    /* ── DASHBOARD ── */
    #dashboard { display: none; max-width: 700px; margin: 0 auto; padding: 0 16px 64px; }

    .adm-header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 22px 0 18px;
    }
    .adm-header img { width: 64px; flex-shrink: 0; border-radius: 14px; }
    .adm-header-info { flex: 1; min-width: 0; }
    .adm-header-info h1 { font-size: 1.3rem; color: var(--navy); font-weight: 800; letter-spacing: -.02em; }
    #adm-contador { margin-top: 3px; font-size: 0.86rem; font-weight: 700; color: var(--green); min-height: 1.2em; }
    .btn-atualizar {
      flex-shrink: 0;
      min-height: 44px;
      padding: 0 16px;
      background: var(--navy);
      color: #fff;
      border: 0;
      border-radius: 10px;
      font: inherit;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      transition: background 120ms;
    }
    .btn-atualizar:hover { background: var(--navy-d); }
    .btn-atualizar.girando .ico { animation: spin .7s linear infinite; display:inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Filtros (sticky) */
    #filtros-wrap {
      position: sticky; top: 0; z-index: 50;
      background: linear-gradient(180deg, var(--paper) 70%, rgba(245,234,216,0));
      padding: 6px 0 14px;
      margin-bottom: 6px;
    }
    #filtros {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 2px;
      scrollbar-width: none;
    }
    #filtros::-webkit-scrollbar { display: none; }
    #filtros button {
      min-height: 40px;
      padding: 0 16px;
      border: 1.5px solid #cdb79a;
      border-radius: 999px;
      background: #fff;
      color: var(--navy);
      font: inherit;
      font-size: 0.88rem;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      transition: background 120ms, color 120ms, border-color 120ms;
      display: inline-flex; align-items: center; gap: 7px;
    }
    #filtros button .pill {
      background: #efe3cf; color: var(--navy); border-radius: 999px;
      font-size: .72rem; font-weight: 800; padding: 1px 7px; min-width: 18px; text-align: center;
    }
    #filtros button.ativo { background: var(--navy); color: #fff; border-color: var(--navy); }
    #filtros button.ativo .pill { background: rgba(255,255,255,.22); color: #fff; }
    #filtros .pill.pill-alert.on { background: var(--red); color: #fff; }
    .filtro-sep { flex-shrink: 0; width: 1px; align-self: stretch; background: #d9c6a8; margin: 4px 2px; }

    /* Busca */
    .busca-wrap {
      display: flex; align-items: center; gap: 8px;
      background: #fff; border: 1.5px solid #cdb79a; border-radius: 12px;
      padding: 0 12px; min-height: 46px; margin-bottom: 10px;
    }
    .busca-wrap:focus-within { border-color: var(--gold); box-shadow: 0 0 0 4px rgba(232,179,92,.22); }
    .busca-wrap .busca-ico { font-size: 1rem; opacity: .6; flex-shrink: 0; }
    .busca-wrap input {
      flex: 1; min-width: 0; border: 0; outline: 0; background: transparent;
      font: inherit; font-size: 1rem; color: var(--ink);
    }
    .busca-wrap input::-webkit-search-cancel-button { display: none; }
    .busca-clear {
      flex-shrink: 0; border: 0; background: #efe3cf; color: var(--navy);
      width: 26px; height: 26px; border-radius: 50%; cursor: pointer;
      font-size: .78rem; font-weight: 800; line-height: 1;
      display: none; align-items: center; justify-content: center;
    }
    .busca-clear.show { display: inline-flex; }
    .busca-info { display: none; font-size: .78rem; color: var(--muted); font-weight: 700; margin: -2px 2px 8px; }
    .busca-info.show { display: block; }

    /* Cards */
    .card {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 18px 18px 16px;
      margin-bottom: 14px;
      box-shadow: 0 6px 22px rgba(22,37,64,.07);
      animation: rise .22s ease both;
    }
    @keyframes rise { from { opacity:0; transform: translateY(6px); } to { opacity:1; transform:none; } }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 14px;
    }
    .card-id-line { display:flex; align-items:center; gap:8px; margin-bottom: 4px; }
    .card-num {
      font-size: .78rem; font-weight: 800; color: var(--navy);
      background: #f1e7d6; border: 1px solid #e3d4ba;
      padding: 2px 9px; border-radius: 8px; letter-spacing: .02em;
    }
    .card-nome { font-size: 1.12rem; font-weight: 800; color: var(--navy-d); letter-spacing: -.01em; }
    .card-produto { font-size: 0.9rem; color: var(--muted); margin-top: 2px; }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: 800;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .badge .dot { width: 7px; height: 7px; border-radius: 50%; }
    .badge-Pendente  { background:#fdeccb; color:#8a5a28; }
    .badge-Pendente .dot  { background:#e8b35c; }
    .badge-Confirmado{ background:#e3eefb; color:#1b4f8a; }
    .badge-Confirmado .dot{ background:#3b82c4; }
    .badge-Atendido  { background:#def3e9; color:#00673f; }
    .badge-Atendido .dot  { background:#16a06a; }
    .badge-Cancelado { background:#efece8; color:#6b7280; }
    .badge-Cancelado .dot { background:#9aa3ad; }

    /* Bloco de destaque (valor + entrega) para Confirmado/Atendido */
    .card-destaque {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      background: linear-gradient(135deg,#eef4fb,#e2edfb);
      border: 1px solid #cdddf0;
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 14px;
    }
    .card-destaque.ok { background: linear-gradient(135deg,#e9f7ef,#ddf2e8); border-color:#c2e6d3; }
    .cd-item .cd-label {
      font-size: .68rem; text-transform: uppercase; letter-spacing: .05em;
      color: var(--muted); font-weight: 800;
    }
    .cd-item .cd-value { font-size: 1.06rem; font-weight: 800; color: var(--blue); margin-top: 3px; }
    .card-destaque.ok .cd-value { color: var(--green); }

    .card-info { display: grid; gap: 7px; font-size: 0.9rem; margin-bottom: 14px; }
    .info-row { display: flex; gap: 10px; align-items: baseline; }
    .info-label { color: var(--muted); font-weight: 700; min-width: 82px; flex-shrink: 0; }
    .info-value { color: var(--ink); word-break: break-word; }
    .info-value a { color: var(--navy); font-weight: 700; text-decoration: none; }
    .info-value a:hover { text-decoration: underline; }
    .info-value .wa { display:inline-flex; align-items:center; gap:5px; }

    .card-meta { font-size: .8rem; color: var(--muted); margin-bottom: 12px; }
    .card-meta b { color: var(--ink); font-weight: 700; }

    .card-acoes { display: flex; gap: 8px; }
    .card-acoes button {
      flex: 1;
      min-height: 48px;
      border-radius: 10px;
      border: 1.8px solid transparent;
      font: inherit;
      font-size: 0.86rem;
      font-weight: 800;
      cursor: pointer;
      transition: background 120ms, color 120ms, transform 80ms;
      display:inline-flex; align-items:center; justify-content:center; gap:6px;
    }
    .card-acoes button:active { transform: translateY(1px); }
    .btn-gold  { background: linear-gradient(180deg,var(--gold),var(--gold-d)); color: var(--navy-d); }
    .btn-green { background: var(--green); color:#fff; }
    .btn-green:hover { background:#005c3a; }
    .btn-cancel{ background: #fff; color: var(--red); border-color: #e7b9b9; }
    .btn-cancel:hover { background:#fbeeee; }
    .btn-ghost { background: #f6f1e8; color: var(--navy); border-color:#e3d8c4; }
    .btn-ghost:hover { background:#efe7d8; }

    /* Estados */
    #loading, #vazio {
      text-align: center;
      padding: 52px 24px;
      color: var(--muted);
      font-size: 0.95rem;
    }
    #vazio { display: none; }
    #vazio .emoji { font-size: 2.2rem; display:block; margin-bottom: 10px; }
    .sem-url { line-height: 1.7; }
    .sem-url code {
      font-family: monospace; background: #f0e8dd;
      padding: 2px 6px; border-radius: 4px; font-size: 0.92rem;
    }

    .adm-footer { text-align: center; padding: 30px 0 8px; }
    .btn-sair {
      background: transparent; border: 0; color: var(--muted);
      font: inherit; font-size: 0.88rem; cursor: pointer; text-decoration: underline;
    }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 10000;
      background: rgba(22,37,64,.55);
      -webkit-backdrop-filter: blur(3px); backdrop-filter: blur(3px);
      display: none; align-items: flex-end; justify-content: center;
      padding: 0;
    }
    .modal-overlay.show { display: flex; animation: fade .15s ease both; }
    @keyframes fade { from { opacity:0; } to { opacity:1; } }
    .modal-box {
      background: #fff;
      width: 100%; max-width: 460px; max-height: 90vh;
      display: flex; flex-direction: column;
      border-radius: 20px 20px 0 0;
      box-shadow: 0 -10px 50px rgba(22,37,64,.3);
      animation: slideUp .22s cubic-bezier(.2,.8,.2,1) both;
      overflow: hidden;
    }
    @keyframes slideUp { from { transform: translateY(28px); } to { transform:none; } }
    .modal-head {
      flex-shrink: 0; padding: 20px 22px 14px;
      border-bottom: 1px solid #f0ece4;
    }
    .modal-head h2 { font-size: 1.12rem; color: var(--navy-d); font-weight: 800; }
    .modal-head .mh-num { font-size: .8rem; color: var(--muted); font-weight: 700; margin-bottom: 3px; }
    .modal-body { flex: 1; overflow-y: auto; padding: 18px 22px; }
    .modal-body p { font-size: .95rem; line-height: 1.55; color: var(--ink); }
    .modal-body .mb-sub { color: var(--muted); font-size: .88rem; margin-top: 8px; }
    .modal-resumo {
      background: #f8f4ec; border:1px solid #ece2d0; border-radius: 12px;
      padding: 12px 14px; margin: 4px 0 18px; font-size: .9rem;
    }
    .modal-resumo .mr-row { display:flex; justify-content:space-between; gap:10px; padding: 3px 0; }
    .modal-resumo .mr-label { color: var(--muted); font-weight:700; }
    .modal-resumo .mr-value { color: var(--ink); font-weight:700; text-align:right; }
    .money-label { font-size:.82rem; font-weight:800; color:var(--muted); text-transform:uppercase; letter-spacing:.04em; margin-bottom: 8px; }
    .money-wrap {
      display:flex; align-items:center; gap:10px;
      border:1.8px solid #dac9b0; border-radius:14px;
      padding: 0 16px; min-height: 64px; background:#fdfbf7;
      overflow: hidden;
    }
    .money-wrap:focus-within { border-color:var(--gold); box-shadow:0 0 0 4px rgba(232,179,92,.25); }
    .money-wrap .rs { font-weight:800; color:var(--muted); font-size:1.1rem; flex-shrink:0; }
    .money-wrap input {
      flex:1; min-width:0; width:100%;
      border:0; outline:0; background:transparent;
      font: inherit; font-size:1.5rem; font-weight:800; text-align:right; color:var(--ink);
    }
    .field-data { margin-bottom: 16px; }
    .field-data input[type="date"] {
      width:100%; min-height:54px; padding:0 16px;
      border:1.6px solid #dac9b0; border-radius:12px; background:#fdfbf7;
      font: inherit; font-size:1.05rem; font-weight:700; color:var(--ink);
    }
    .field-data input[type="date"]:focus { outline:0; border-color:var(--gold); box-shadow:0 0 0 4px rgba(232,179,92,.25); }
    .modal-foot {
      flex-shrink: 0; display: flex; gap: 10px;
      padding: 14px 22px calc(16px + env(safe-area-inset-bottom));
      border-top: 1px solid #f0ece4;
    }
    .modal-foot button {
      flex: 1; min-height: 52px; border-radius: 12px;
      font: inherit; font-size: .95rem; font-weight: 800; cursor: pointer;
      border: 1.8px solid transparent; transition: filter 120ms, background 120ms, transform 80ms;
    }
    .modal-foot button:active { transform: translateY(1px); }
    .mf-cancel { background:#f2ede4; color:var(--navy); }
    .mf-cancel:hover { background:#e9e2d4; }
    .mf-ok-gold  { background: linear-gradient(180deg,var(--gold),var(--gold-d)); color:var(--navy-d); }
    .mf-ok-green { background: var(--green); color:#fff; }
    .mf-ok-red   { background: var(--red); color:#fff; }

    /* ── TOASTS ── */
    #toast-area {
      position: fixed; left: 0; right: 0; bottom: 18px; z-index: 10001;
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      padding: 0 16px; pointer-events: none;
    }
    .toast {
      pointer-events: auto;
      max-width: 440px; width: 100%;
      padding: 13px 16px; border-radius: 12px;
      font-size: .9rem; font-weight: 700; color: #fff;
      box-shadow: 0 10px 30px rgba(22,37,64,.25);
      display: flex; align-items: center; gap: 10px;
      animation: toastIn .2s ease both;
    }
    @keyframes toastIn { from { opacity:0; transform: translateY(10px); } to { opacity:1; transform:none; } }
    .toast.success { background:#0b7a4d; }
    .toast.error   { background:#b42a2a; }
    .toast.warning { background:#b9851f; }
    .toast.info    { background:#2c4a72; }
    .toast .tx { line-height:1.4; }

    @media (min-width: 560px) {
      .modal-overlay { align-items: center; padding: 24px; }
      .modal-box { border-radius: 20px; }
    }
    @media (max-width: 400px) {
      .card-acoes { flex-wrap: wrap; }
      .card-acoes button { min-height: 50px; }
      .card-destaque { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- ── GATE ── -->
<div id="gate">
  <div class="gate-card">
    <img src="assets/logo-dolci-dri.png" alt="Dolci Dri">
    <h1>Área administrativa</h1>
    <p class="sub">Digite a senha para acessar os pedidos</p>
    <input type="password" id="senha" placeholder="Senha" autocomplete="current-password">
    <button class="btn-entrar" onclick="entrar()">Entrar</button>
    <p id="gate-erro"></p>
  </div>
</div>

<!-- ── DASHBOARD ── -->
<div id="dashboard">
  <div class="adm-header">
    <img src="assets/logo-dolci-dri.png" alt="Dolci Dri">
    <div class="adm-header-info">
      <h1>Pedidos</h1>
      <div id="adm-contador"></div>
    </div>
    <button class="btn-atualizar" id="btnAtualizar" onclick="carregarPedidos()" title="Recarregar lista">
      <span class="ico">&#8635;</span> Atualizar
    </button>
  </div>

  <div id="filtros-wrap">
    <div class="busca-wrap">
      <span class="busca-ico">🔍</span>
      <input id="busca" type="search" inputmode="search" autocomplete="off" spellcheck="false"
             placeholder="Buscar nome, telefone ou nº do pedido">
      <button id="buscaClear" class="busca-clear" type="button" title="Limpar busca" aria-label="Limpar busca">✕</button>
    </div>
    <div id="filtros">
      <button data-f="Hoje"                  onclick="filtrar(this)">Hoje <span class="pill" data-c="Hoje">0</span></button>
      <button data-f="Atrasados"             onclick="filtrar(this)">Atrasados <span class="pill pill-alert" data-c="Atrasados">0</span></button>
      <button data-f="7dias"                 onclick="filtrar(this)">7 dias <span class="pill" data-c="7dias">0</span></button>
      <span class="filtro-sep"></span>
      <button data-f="Pendente"  class="ativo" onclick="filtrar(this)">Pendentes <span class="pill" data-c="Pendente">0</span></button>
      <button data-f="Confirmado"            onclick="filtrar(this)">Confirmados <span class="pill" data-c="Confirmado">0</span></button>
      <button data-f="Atendido"              onclick="filtrar(this)">Atendidos <span class="pill" data-c="Atendido">0</span></button>
      <button data-f="Cancelado"             onclick="filtrar(this)">Cancelados <span class="pill" data-c="Cancelado">0</span></button>
      <button data-f="Todos"                 onclick="filtrar(this)">Todos</button>
    </div>
    <div class="busca-info" id="buscaInfo"></div>
  </div>

  <div id="loading">Carregando pedidos…</div>
  <div id="vazio"></div>
  <div id="lista"></div>

  <div class="adm-footer">
    <button class="btn-sair" onclick="sair()">Sair</button>
  </div>
</div>

<!-- ── MODAL ── -->
<div class="modal-overlay" id="modal">
  <div class="modal-box" id="modal-box" role="dialog" aria-modal="true"></div>
</div>

<!-- ── TOASTS ── -->
<div id="toast-area"></div>

<script>
  // ── CONFIGURAÇÃO ───────────────────────────────────────────────
  var SCRIPT_URL    = 'https://script.google.com/macros/s/AKfycbySJRsCP_uKNY5XgtdrP5KKY_e4hcNU-2Ka5D4XzJ4KKB6Z23hvM3eRBmJqTBYVl7ohbw/exec';
  var SENHA_CORRETA = 'dolcidri2026';
  var AUTH_KEY      = 'dolcidri_admin_ok';
  // ──────────────────────────────────────────────────────────────

  var todosPedidos = [];
  var filtroAtual  = 'Pendente';

  // ── Helpers ───────────────────────────────────────────────────
  function el(id) { return document.getElementById(id); }
  function onlyDigits(v) { return String(v || '').replace(/\D/g, ''); }

  function esc(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  function n3(x) {
    var n = parseInt(x, 10);
    if (isNaN(n)) return '';
    var s = String(n);
    while (s.length < 3) s = '0' + s;
    return s;
  }

  function numeroPedido(p) {
    return p.numero ? '#' + n3(p.numero) : '#' + String(p.id || '').slice(-4);
  }

  // Valor em centavos → "1.234,56" (padrão pt-BR; armazenado sempre em centavos)
  function fmtCentavos(c) {
    c = Math.max(0, parseInt(c, 10) || 0);
    var s = String(c);
    while (s.length < 3) s = '0' + s;
    var inteiro = s.slice(0, -2);
    var dec     = s.slice(-2);
    inteiro = inteiro.replace(/\B(?=(\d{3})+(?!\d))/g, '.');
    return inteiro + ',' + dec;
  }
  function fmtReais(c) {
    if (c === '' || c == null || isNaN(parseInt(c, 10))) return '—';
    return 'R$ ' + fmtCentavos(c);
  }

  // Data desejada → DD/MM/AAAA. Aceita ISO (2026-06-26T03:00:00.000Z), YYYY-MM-DD ou já BR.
  // Fatia a porção de calendário para nunca cruzar de dia por fuso (padrão T12:00:00Z / UTC-3).
  function soData(v) {
    if (!v) return '';
    v = String(v);
    var m = v.match(/^(\d{4})-(\d{2})-(\d{2})/);
    if (m) return m[3] + '/' + m[2] + '/' + m[1];
    return v; // já em DD/MM/AAAA ou texto livre
  }

  // DD/MM/AAAA ou ISO → YYYY-MM-DD (para <input type="date">).
  function paraInputDate(v) {
    if (!v) return '';
    v = String(v);
    var iso = v.match(/^(\d{4})-(\d{2})-(\d{2})/);
    if (iso) return iso[1] + '-' + iso[2] + '-' + iso[3];
    var br = v.match(/^(\d{2})\/(\d{2})\/(\d{4})/);
    if (br) return br[3] + '-' + br[2] + '-' + br[1];
    return '';
  }
  // YYYY-MM-DD → DD/MM/AAAA (para gravar no padrão da planilha).
  function inputDateParaBR(v) {
    var m = String(v || '').match(/^(\d{4})-(\d{2})-(\d{2})/);
    return m ? m[3] + '/' + m[2] + '/' + m[1] : '';
  }

  // Datetime (enviado/confirmado/atendido) → DD/MM/AAAA HH:MM em America/Belem (UTC-3).
  function dataHora(v) {
    if (!v) return '';
    v = String(v);
    if (/^\d{4}-\d{2}-\d{2}T/.test(v)) {
      var d = new Date(v);
      if (!isNaN(d.getTime())) {
        return d.toLocaleString('pt-BR', {
          timeZone: 'America/Belem',
          day: '2-digit', month: '2-digit', year: 'numeric',
          hour: '2-digit', minute: '2-digit'
        }).replace(',', '');
      }
    }
    return v;
  }

  function horaAgora() {
    return new Date().toLocaleString('pt-BR', {
      timeZone: 'America/Belem',
      day: '2-digit', month: '2-digit', year: 'numeric',
      hour: '2-digit', minute: '2-digit'
    }).replace(',', '');
  }

  // Hoje em YYYY-MM-DD (America/Belem), para default de <input type="date">.
  function hojeInput() {
    return new Date().toLocaleDateString('en-CA', { timeZone: 'America/Belem' });
  }

  // ── Busca e visões por data ───────────────────────────────────
  function normaliza(s) {
    return String(s == null ? '' : s).toLowerCase()
      .normalize('NFD').replace(/[̀-ͯ]/g, '');
  }

  // Data de entrega do pedido como chave comparável YYYY-MM-DD ('' se não parseável).
  function chaveData(p) { return paraInputDate(p && p.data) || ''; }

  // Aritmética de data segura (UTC, sem drift de fuso) sobre YYYY-MM-DD.
  function addDiasISO(iso, n) {
    var a = String(iso).split('-');
    var d = new Date(Date.UTC(+a[0], +a[1] - 1, +a[2]));
    d.setUTCDate(d.getUTCDate() + n);
    return d.toISOString().slice(0, 10);
  }

  // Pedido "aberto" = ainda na operação (Pendente ou Confirmado).
  function ehAberto(p) { var s = p.status || 'Pendente'; return s === 'Pendente' || s === 'Confirmado'; }

  // Pertence à visão de data? (só conta pedidos abertos)
  function naVisaoData(p, view, hoje) {
    if (!ehAberto(p)) return false;
    var k = chaveData(p);
    if (!k) return false;
    if (view === 'Hoje')      return k === hoje;
    if (view === 'Atrasados') return k < hoje;
    if (view === '7dias')     return k >= hoje && k <= addDiasISO(hoje, 6);
    return false;
  }

  // Casamento da busca: nome (sem acento), telefone (dígitos) ou número do pedido.
  function matchBusca(p, termo) {
    var t = normaliza(termo).trim();
    if (!t) return true;
    if (normaliza(p.nome).indexOf(t) >= 0) return true;
    var d = onlyDigits(termo);
    if (d) {
      if (onlyDigits(p.telefone).indexOf(d) >= 0) return true;
      if (n3(p.numero).indexOf(d) >= 0) return true;
      if (String(p.numero || '') === String(parseInt(d, 10))) return true;
    }
    return false;
  }

  // Ordena por data de entrega (mais próximo primeiro); sem data vai pro fim.
  function ordenarPorEntrega(arr) {
    return arr.slice().sort(function (x, y) {
      var dx = chaveData(x) || '9999-99-99';
      var dy = chaveData(y) || '9999-99-99';
      if (dx < dy) return -1;
      if (dx > dy) return 1;
      return (parseInt(x.numero, 10) || 0) - (parseInt(y.numero, 10) || 0);
    });
  }

  // ── Toast ─────────────────────────────────────────────────────
  function toast(msg, tipo, ms) {
    tipo = tipo || 'info'; ms = ms || 3400;
    var t = document.createElement('div');
    t.className = 'toast ' + tipo;
    t.innerHTML = '<span class="tx">' + esc(msg) + '</span>';
    el('toast-area').appendChild(t);
    setTimeout(function () {
      t.style.transition = 'opacity .2s, transform .2s';
      t.style.opacity = '0'; t.style.transform = 'translateY(8px)';
      setTimeout(function () { t.remove(); }, 220);
    }, ms);
  }

  // ── Autenticação ──────────────────────────────────────────────
  function checkAuth() {
    if (localStorage.getItem(AUTH_KEY) === '1') abrirDashboard();
  }
  function entrar() {
    var v = el('senha').value;
    if (v === SENHA_CORRETA) {
      localStorage.setItem(AUTH_KEY, '1');
      el('gate-erro').textContent = '';
      abrirDashboard();
    } else {
      el('gate-erro').textContent = 'Senha incorreta.';
      toast('Senha incorreta.', 'error');
    }
  }
  function abrirDashboard() {
    el('gate').style.display = 'none';
    el('dashboard').style.display = 'block';
    carregarPedidos();
  }
  function sair() {
    localStorage.removeItem(AUTH_KEY);
    el('dashboard').style.display = 'none';
    el('gate').style.display = '';
    el('senha').value = '';
    el('gate-erro').textContent = '';
  }

  // ── Carregar pedidos ──────────────────────────────────────────
  function carregarPedidos() {
    var loading = el('loading'), vazio = el('vazio'), btn = el('btnAtualizar');
    el('lista').innerHTML = '';
    vazio.style.display = 'none';
    loading.style.display = '';
    loading.textContent = 'Carregando pedidos…';
    if (btn) btn.classList.add('girando');

    if (!SCRIPT_URL) {
      loading.innerHTML = '<div class="sem-url">'
        + '<p>Configure o <code>SCRIPT_URL</code> no topo de <code>admin.html</code></p>'
        + '<p>após publicar o Apps Script.</p></div>';
      if (btn) btn.classList.remove('girando');
      return;
    }

    fetch(SCRIPT_URL + '?action=listar')
      .then(function (r) { return r.json(); })
      .then(function (data) {
        todosPedidos = data.pedidos || [];
        loading.style.display = 'none';
        renderizarFiltro();
        atualizarContadores();
      })
      .catch(function () {
        loading.textContent = 'Erro ao carregar. Verifique o SCRIPT_URL e tente atualizar.';
        toast('Não foi possível carregar os pedidos.', 'error');
      })
      .finally(function () { if (btn) btn.classList.remove('girando'); });
  }

  // ── Filtros ───────────────────────────────────────────────────
  function filtrar(btn) {
    filtroAtual = btn.dataset.f;
    if (el('busca').value) { el('busca').value = ''; el('buscaClear').classList.remove('show'); }
    document.querySelectorAll('#filtros button').forEach(function (b) {
      b.classList.toggle('ativo', b === btn);
    });
    renderizarFiltro();
  }

  // ── Renderização ──────────────────────────────────────────────
  function mensagemVazio(termo) {
    if (termo) return '<span class="emoji">🔍</span>Ninguém encontrado para “' + esc(termo) + '”.';
    if (todosPedidos.length === 0)
      return '<span class="emoji">🍰</span>Nenhum pedido cadastrado ainda.<br>Eles aparecerão aqui assim que chegarem pelo site.';
    return ({
      'Hoje':      '<span class="emoji">☀️</span>Nada para entregar hoje.',
      'Atrasados': '<span class="emoji">✅</span>Nenhum pedido atrasado.',
      '7dias':     '<span class="emoji">🗓️</span>Nada nos próximos 7 dias.'
    }[filtroAtual]) || '<span class="emoji">✨</span>Nenhum pedido nesta categoria.';
  }

  function renderizarFiltro() {
    var lista = el('lista'), vazio = el('vazio'), info = el('buscaInfo');
    var termo = (el('busca') ? el('busca').value : '').trim();
    var hoje  = hojeInput();
    var exibir, ordenarData = true;

    if (termo) {
      // Busca varre TODOS os status — para localizar qualquer pessoa.
      exibir = todosPedidos.filter(function (p) { return matchBusca(p, termo); });
      info.textContent = 'Busca em todos os status — ' + exibir.length + (exibir.length === 1 ? ' resultado' : ' resultados');
      info.classList.add('show');
    } else {
      info.classList.remove('show');
      info.textContent = '';
      if (filtroAtual === 'Hoje' || filtroAtual === 'Atrasados' || filtroAtual === '7dias') {
        exibir = todosPedidos.filter(function (p) { return naVisaoData(p, filtroAtual, hoje); });
      } else if (filtroAtual === 'Todos') {
        exibir = todosPedidos.slice();
        ordenarData = false; // mantém ordem do backend (mais recente primeiro)
      } else {
        exibir = todosPedidos.filter(function (p) { return (p.status || 'Pendente') === filtroAtual; });
        ordenarData = (filtroAtual === 'Pendente' || filtroAtual === 'Confirmado');
      }
    }

    if (termo || ordenarData) exibir = ordenarPorEntrega(exibir);

    if (exibir.length === 0) {
      lista.innerHTML = '';
      vazio.innerHTML = mensagemVazio(termo);
      vazio.style.display = 'block';
    } else {
      vazio.style.display = 'none';
      lista.innerHTML = exibir.map(renderCard).join('');
    }
  }

  function renderDestaque(p, concluido) {
    var dataLabel = concluido ? 'Entregue em' : 'Data de entrega';
    var dataValue = concluido ? (soData(p.entregueEm) || soData(p.data)) : soData(p.data);
    return '<div class="card-destaque' + (concluido ? ' ok' : '') + '">'
      + '<div class="cd-item"><div class="cd-label">Valor do orçamento</div><div class="cd-value">' + fmtReais(p.valor) + '</div></div>'
      + '<div class="cd-item"><div class="cd-label">' + dataLabel + '</div><div class="cd-value">' + esc(dataValue) + '</div></div>'
      + '</div>';
  }

  function renderAcoes(p) {
    var status = p.status || 'Pendente';
    var id = "'" + esc(p.id).replace(/'/g, "\\'") + "'";

    if (status === 'Pendente') {
      return '<div class="card-acoes">'
        + '<button class="btn-gold" onclick="abrirValor(' + id + ', false)">✓ Confirmar pedido</button>'
        + '<button class="btn-cancel" onclick="pedirConfirmacao(' + id + ', \'Cancelado\')">Cancelar</button>'
        + '</div>';
    }
    if (status === 'Confirmado') {
      return '<div class="card-acoes">'
        + '<button class="btn-green" onclick="abrirEntrega(' + id + ')">✓ Entregue</button>'
        + '<button class="btn-ghost" onclick="abrirValor(' + id + ', true)">Editar</button>'
        + '<button class="btn-cancel" onclick="pedirConfirmacao(' + id + ', \'Cancelado\')">Cancelar</button>'
        + '</div>';
    }
    if (status === 'Atendido') {
      return '<div class="card-acoes">'
        + '<button class="btn-ghost" onclick="pedirConfirmacao(' + id + ', \'Confirmado\')">↩ Reabrir pedido</button>'
        + '</div>';
    }
    // Cancelado
    return '<div class="card-acoes">'
      + '<button class="btn-ghost" onclick="pedirConfirmacao(' + id + ', \'Pendente\')">↩ Reabrir pedido</button>'
      + '</div>';
  }

  function renderCard(p) {
    var status = p.status || 'Pendente';
    var wa = 'https://wa.me/55' + onlyDigits(p.telefone);

    var destaque = (status === 'Confirmado' || status === 'Atendido')
      ? renderDestaque(p, status === 'Atendido') : '';

    var detalhesHtml = p.detalhes
      ? '<div class="info-row"><span class="info-label">Detalhes</span><span class="info-value">' + esc(p.detalhes) + '</span></div>'
      : '';

    // Linha de meta conforme o status
    var meta = '';
    if (status === 'Confirmado' && p.confirmadoEm)
      meta = 'Confirmado em <b>' + esc(dataHora(p.confirmadoEm)) + '</b>';
    else if (status === 'Atendido' && p.atendidoEm)
      meta = 'Baixa registrada em <b>' + esc(dataHora(p.atendidoEm)) + '</b>';
    else if (status === 'Cancelado' && p.canceladoEm)
      meta = 'Cancelado em <b>' + esc(dataHora(p.canceladoEm)) + '</b>';
    var metaHtml = meta ? '<div class="card-meta">' + meta + '</div>' : '';

    return '<div class="card" id="card-' + esc(p.id) + '">'
      + '<div class="card-top">'
        + '<div>'
          + '<div class="card-id-line"><span class="card-num">' + esc(numeroPedido(p)) + '</span></div>'
          + '<div class="card-nome">' + esc(p.nome) + '</div>'
          + '<div class="card-produto">' + esc(p.produto) + ' — ' + esc(p.quantidade) + '</div>'
        + '</div>'
        + '<span class="badge badge-' + esc(status) + '"><span class="dot"></span>' + esc(status) + '</span>'
      + '</div>'
      + destaque
      + '<div class="card-info">'
        + '<div class="info-row"><span class="info-label">Entrega em</span><span class="info-value">' + esc(soData(p.data)) + '</span></div>'
        + '<div class="info-row"><span class="info-label">Retirada</span><span class="info-value">' + esc(p.entrega) + '</span></div>'
        + '<div class="info-row"><span class="info-label">Telefone</span><span class="info-value"><a class="wa" href="' + esc(wa) + '" target="_blank" rel="noopener">📱 ' + esc(p.telefone) + '</a></span></div>'
        + detalhesHtml
        + '<div class="info-row"><span class="info-label">Pedido em</span><span class="info-value">' + esc(dataHora(p.enviado)) + '</span></div>'
      + '</div>'
      + metaHtml
      + renderAcoes(p)
    + '</div>';
  }

  // ── Contadores ────────────────────────────────────────────────
  function atualizarContadores() {
    var hoje = hojeInput();
    var cont = { Pendente: 0, Confirmado: 0, Atendido: 0, Cancelado: 0, Hoje: 0, Atrasados: 0, '7dias': 0 };
    for (var i = 0; i < todosPedidos.length; i++) {
      var p = todosPedidos[i];
      var s = p.status || 'Pendente';
      if (cont[s] != null) cont[s]++;
      if (naVisaoData(p, 'Hoje', hoje))      cont.Hoje++;
      if (naVisaoData(p, 'Atrasados', hoje)) cont.Atrasados++;
      if (naVisaoData(p, '7dias', hoje))     cont['7dias']++;
    }
    Object.keys(cont).forEach(function (k) {
      var pill = document.querySelector('#filtros .pill[data-c="' + k + '"]');
      if (pill) pill.textContent = cont[k];
    });
    var alerta = document.querySelector('#filtros .pill[data-c="Atrasados"]');
    if (alerta) alerta.classList.toggle('on', cont.Atrasados > 0);

    var partes = [];
    if (cont.Pendente > 0)  partes.push(cont.Pendente + (cont.Pendente === 1 ? ' pendente' : ' pendentes'));
    if (cont.Hoje > 0)      partes.push(cont.Hoje + ' p/ hoje');
    if (cont.Atrasados > 0) partes.push('⚠️ ' + cont.Atrasados + (cont.Atrasados === 1 ? ' atrasado' : ' atrasados'));
    el('adm-contador').textContent = partes.length ? partes.join(' · ') : 'Tudo em dia ✓';
    document.title = (cont.Atrasados > 0 ? '⚠️ ' : (cont.Pendente > 0 ? '(' + cont.Pendente + ') ' : '')) + 'Admin — Dolci Dri';
  }

  function getPedido(id) {
    for (var i = 0; i < todosPedidos.length; i++)
      if (String(todosPedidos[i].id) === String(id)) return todosPedidos[i];
    return null;
  }

  // ── MODAL ─────────────────────────────────────────────────────
  function fecharModal() {
    el('modal').classList.remove('show');
    el('modal-box').innerHTML = '';
  }
  function abrirModal(html) {
    el('modal-box').innerHTML = html;
    el('modal').classList.add('show');
  }

  // Confirmação para troca de status (rótulo varia conforme a transição).
  function pedirConfirmacao(id, novoStatus) {
    var p = getPedido(id);
    if (!p) return;
    var atual = p.status || 'Pendente';
    var num   = numeroPedido(p);

    var cfg = {
      'Cancelado':  { titulo: 'Cancelar pedido ' + num + '?',  texto: 'O pedido de <b>' + esc(p.nome) + '</b> será marcado como <b>cancelado</b>.', btn: 'Sim, cancelar', cls: 'mf-ok-red' },
      'Atendido':   { titulo: 'Marcar ' + num + ' como entregue?', texto: 'Confirme que o pedido de <b>' + esc(p.nome) + '</b> foi <b>entregue</b>.', btn: 'Sim, foi entregue', cls: 'mf-ok-green' },
      'Confirmado': { titulo: 'Reabrir pedido ' + num + '?', texto: 'O pedido de <b>' + esc(p.nome) + '</b> voltará para <b>Confirmado</b> (a entregar).', btn: 'Sim, reabrir', cls: 'mf-ok-gold' },
      'Pendente':   { titulo: 'Reabrir pedido ' + num + '?', texto: 'O pedido de <b>' + esc(p.nome) + '</b> voltará para <b>Pendente</b> e o orçamento será zerado.', btn: 'Sim, reabrir', cls: 'mf-ok-gold' }
    }[novoStatus];

    // Aviso extra quando se sai de um estado já "fechado" (Confirmado/Atendido/Cancelado).
    var saindoDeFechado = (atual === 'Confirmado' || atual === 'Atendido' || atual === 'Cancelado');
    var aviso = saindoDeFechado
      ? '<p class="mb-sub">Status atual: <b>' + esc(atual) + '</b>. Esta troca altera um pedido já processado.</p>'
      : '';

    abrirModal(
      '<div class="modal-head"><div class="mh-num">Pedido ' + esc(num) + '</div><h2>' + cfg.titulo + '</h2></div>'
      + '<div class="modal-body"><p>' + cfg.texto + '</p>' + aviso + '</div>'
      + '<div class="modal-foot">'
        + '<button class="mf-cancel" id="mCancel">Voltar</button>'
        + '<button class="' + cfg.cls + '" id="mOk">' + cfg.btn + '</button>'
      + '</div>'
    );
    el('mCancel').onclick = fecharModal;
    el('mOk').onclick = function () { fecharModal(); executarMudanca(id, novoStatus); };
  }

  // Modal de valor (confirmar pedido a partir de Pendente, ou editar valor de um Confirmado).
  function abrirValor(id, editando) {
    var p = getPedido(id);
    if (!p) return;
    var num = numeroPedido(p);
    var inicial = (editando && p.valor !== '' && p.valor != null) ? parseInt(p.valor, 10) || 0 : 0;

    abrirModal(
      '<div class="modal-head"><div class="mh-num">Pedido ' + esc(num) + '</div><h2>' + (editando ? 'Editar pedido' : 'Confirmar pedido') + '</h2></div>'
      + '<div class="modal-body">'
        + '<div class="modal-resumo">'
          + '<div class="mr-row"><span class="mr-label">Cliente</span><span class="mr-value">' + esc(p.nome) + '</span></div>'
          + '<div class="mr-row"><span class="mr-label">Produto</span><span class="mr-value">' + esc(p.produto) + ' — ' + esc(p.quantidade) + '</span></div>'
        + '</div>'
        + '<div class="field-data">'
          + '<div class="money-label">Data de entrega</div>'
          + '<input type="date" id="dataInput" value="' + esc(paraInputDate(p.data)) + '">'
        + '</div>'
        + '<div class="money-label">Valor do orçamento</div>'
        + '<div class="money-wrap"><span class="rs">R$</span><input id="valorInput" inputmode="numeric" autocomplete="off" placeholder="0,00"></div>'
        + (editando ? '' : '<p class="mb-sub">Ao confirmar, o pedido passa para <b>Confirmado</b> e o cliente entra na fila de produção.</p>')
      + '</div>'
      + '<div class="modal-foot">'
        + '<button class="mf-cancel" id="mCancel">Voltar</button>'
        + '<button class="mf-ok-gold" id="mOk">' + (editando ? 'Salvar' : 'Confirmar pedido') + '</button>'
      + '</div>'
    );

    var input = el('valorInput');
    var centavos = inicial;
    function pinta() { input.value = fmtCentavos(centavos); }
    pinta();
    input.addEventListener('input', function () {
      centavos = parseInt(onlyDigits(input.value), 10) || 0;
      pinta();
    });
    input.addEventListener('keydown', function (e) { if (e.key === 'Enter') el('mOk').click(); });
    setTimeout(function () { input.focus(); }, 60);

    el('mCancel').onclick = fecharModal;
    el('mOk').onclick = function () {
      var dataInput = el('dataInput').value;
      if (!dataInput) { toast('Informe a data de entrega.', 'warning'); el('dataInput').focus(); return; }
      if (centavos <= 0) { toast('Informe o valor do orçamento.', 'warning'); input.focus(); return; }
      var dataBR = inputDateParaBR(dataInput);
      fecharModal();
      if (editando) definirValor(id, centavos, dataBR);
      else executarMudanca(id, 'Confirmado', centavos, dataBR);
    };
  }

  // Modal de confirmação de entrega — pede a data efetiva (Confirmado → Atendido).
  function abrirEntrega(id) {
    var p = getPedido(id);
    if (!p) return;
    var num = numeroPedido(p);
    var def = paraInputDate(p.data) || hojeInput();

    abrirModal(
      '<div class="modal-head"><div class="mh-num">Pedido ' + esc(num) + '</div><h2>Confirmar entrega</h2></div>'
      + '<div class="modal-body">'
        + '<div class="modal-resumo">'
          + '<div class="mr-row"><span class="mr-label">Cliente</span><span class="mr-value">' + esc(p.nome) + '</span></div>'
          + '<div class="mr-row"><span class="mr-label">Produto</span><span class="mr-value">' + esc(p.produto) + ' — ' + esc(p.quantidade) + '</span></div>'
          + '<div class="mr-row"><span class="mr-label">Entrega prevista</span><span class="mr-value">' + esc(soData(p.data)) + '</span></div>'
        + '</div>'
        + '<div class="field-data">'
          + '<div class="money-label">Data da entrega efetiva</div>'
          + '<input type="date" id="entregaInput" value="' + esc(def) + '">'
        + '</div>'
        + '<p class="mb-sub">Ao confirmar, o pedido passa para <b>Atendido</b> (concluído).</p>'
      + '</div>'
      + '<div class="modal-foot">'
        + '<button class="mf-cancel" id="mCancel">Voltar</button>'
        + '<button class="mf-ok-green" id="mOk">✓ Confirmar entrega</button>'
      + '</div>'
    );

    el('mCancel').onclick = fecharModal;
    el('mOk').onclick = function () {
      var v = el('entregaInput').value;
      if (!v) { toast('Informe a data da entrega.', 'warning'); el('entregaInput').focus(); return; }
      fecharModal();
      executarMudanca(id, 'Atendido', null, null, inputDateParaBR(v));
    };
  }

  // ── Executar troca de status (otimista + POST) ─────────────────
  function executarMudanca(id, novoStatus, valorCentavos, dataBR, entregueBR) {
    var p = getPedido(id);
    if (!p) return;
    var agora = horaAgora();

    p.status = novoStatus;
    if (novoStatus === 'Confirmado') {
      p.confirmadoEm = agora; p.atendidoEm = ''; p.canceladoEm = ''; p.entregueEm = '';
      if (valorCentavos != null) p.valor = valorCentavos;
      if (dataBR) p.data = dataBR;
    } else if (novoStatus === 'Atendido') {
      p.atendidoEm = agora; p.canceladoEm = '';
      if (entregueBR) p.entregueEm = entregueBR;
    } else if (novoStatus === 'Cancelado') {
      p.canceladoEm = agora; p.atendidoEm = ''; p.entregueEm = '';
    } else if (novoStatus === 'Pendente') {
      p.confirmadoEm = ''; p.atendidoEm = ''; p.canceladoEm = ''; p.entregueEm = ''; p.valor = '';
    }

    renderizarFiltro();
    atualizarContadores();

    var rotulo = {
      Confirmado: 'Pedido ' + numeroPedido(p) + ' confirmado.',
      Atendido:   'Pedido ' + numeroPedido(p) + ' marcado como entregue.',
      Cancelado:  'Pedido ' + numeroPedido(p) + ' cancelado.',
      Pendente:   'Pedido ' + numeroPedido(p) + ' reaberto.'
    }[novoStatus];
    toast(rotulo, novoStatus === 'Cancelado' ? 'warning' : 'success');

    if (!SCRIPT_URL) return;
    var body = { action: 'atualizarStatus', id: id, status: novoStatus };
    if (valorCentavos != null) body.valor = valorCentavos;
    if (dataBR) body.data = dataBR;
    if (entregueBR) body.entregueEm = entregueBR;
    fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(body) })
      .catch(function () { toast('Falha ao salvar no servidor. Atualize para conferir.', 'error', 5000); });
  }

  function definirValor(id, valorCentavos, dataBR) {
    var p = getPedido(id);
    if (!p) return;
    p.valor = valorCentavos;
    if (dataBR) p.data = dataBR;
    renderizarFiltro();
    atualizarContadores();
    toast('Pedido ' + numeroPedido(p) + ' atualizado.', 'success');
    if (!SCRIPT_URL) return;
    var body = { action: 'definirValor', id: id, valor: valorCentavos };
    if (dataBR) body.data = dataBR;
    fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(body) })
      .catch(function () { toast('Falha ao salvar.', 'error'); });
  }

  // ── Init ──────────────────────────────────────────────────────
  el('senha').addEventListener('keydown', function (e) { if (e.key === 'Enter') entrar(); });
  el('busca').addEventListener('input', function () {
    el('buscaClear').classList.toggle('show', !!el('busca').value);
    renderizarFiltro();
  });
  el('buscaClear').addEventListener('click', function () {
    el('busca').value = '';
    el('buscaClear').classList.remove('show');
    el('busca').focus();
    renderizarFiltro();
  });
  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape' && el('modal').classList.contains('show')) fecharModal();
  });
  el('modal').addEventListener('click', function (e) { if (e.target === el('modal')) fecharModal(); });
  checkAuth();
</script>
</body>
</html>
